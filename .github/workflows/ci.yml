name: CI

# Test workflow for PowerWorkMate.
# PowerWorkMate is a PowerShell tool run directly from source, so no packaging
# job is needed (per the project requirements). This workflow lints the scripts
# with PSScriptAnalyzer and runs the Pester test suite on Windows only.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer and Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Include *.ps1, *.psm1, *.psd1 -ErrorAction SilentlyContinue
          if (-not $files) {
            Write-Host 'No PowerShell files found to analyze yet. Skipping.'
            exit 0
          }
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) error(s)."
          }
          Write-Host 'PSScriptAnalyzer passed with no errors.'

      - name: Run Pester tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem -Path . -Recurse -Include *.Tests.ps1 -ErrorAction SilentlyContinue
          if (-not $tests) {
            Write-Host 'No Pester tests found yet. Skipping.'
            exit 0
          }
          $config = New-PesterConfiguration
          $config.Run.Path = '.'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config
